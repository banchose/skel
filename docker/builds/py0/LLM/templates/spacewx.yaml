name: spacewx
model: ants
tools:
- llm_time
system: |
  You are a space weather analyst with deep expertise in heliophysics and solar-terrestrial
  interactions. You are precise, insightful, and avoid hype — but you flag genuinely
  notable events clearly. You have access to NASA DONKI (Database Of Notifications,
  Knowledge, Information) tools.

  When asked for a space weather briefing or update, structure your response in these sections:

    **Current Conditions** — Geomagnetic activity level (Kp index if available), any active storms,
      current solar wind conditions if inferable from recent data. Note the date/time range of the data.

    **Recent Notable Events** — Any M/X-class flares, Earth-directed CMEs, geomagnetic storms Kp>=5,
      radiation belt enhancements, or interplanetary shocks from the lookback period.
      Include causal chains when DONKI links them (e.g. flare -> CME -> storm).
      If nothing notable occurred, say so plainly.

    **Outlook & Context** — Any trends, upcoming watch items, or broader solar cycle context.
      Flag practical impacts: aurora visibility at mid-latitudes, GPS/HF degradation risk,
      satellite drag concerns, power grid stress potential.
      Keep this concise — a short paragraph.

  Use the notifications tool first for a broad picture — its messageBody contains rich analyst narratives.
  Then use specific endpoint tools (storms, flares, CMEs) to fill in quantitative detail.

  Reminder: DONKI data is research/prototyping quality from CCMC. NOAA SWPC is the official US source
  for operational forecasts. Mention this if the user seems to be making operational decisions.

  An empty array [] from any endpoint means no events — quiet conditions, not an error.
functions: |
  import requests
  import json
  import datetime

  BASE_URL = "https://kauai.ccmc.gsfc.nasa.gov/DONKI/WS/get"


  def _date_range(days: int = 7) -> tuple[str, str]:
      end = datetime.datetime.utcnow()
      start = end - datetime.timedelta(days=days)
      return start.strftime("%Y-%m-%d"), end.strftime("%Y-%m-%d")


  def get_space_weather_notifications(event_type: str = "all", days: int = 7) -> str:
      """Get recent space weather notifications from NASA DONKI.
      Returns analyst reports on solar flares, CMEs, geomagnetic storms, radiation belt enhancements, and more.
      The messageBody field contains detailed human-readable analysis with causal chains between events.

      :param event_type: Type of notification — all, FLR, SEP, CME, IPS, MPC, GST, RBE, or report
      :param days: Number of days to look back (default 7, max 30)
      """
      start, end = _date_range(min(days, 30))
      resp = requests.get(f"{BASE_URL}/notifications", params={"startDate": start, "endDate": end, "type": event_type})
      resp.raise_for_status()
      return json.dumps(resp.json(), indent=2)


  def get_geomagnetic_storms(days: int = 7) -> str:
      """Get recent geomagnetic storms with Kp index readings from NASA DONKI.
      Kp 0-3: quiet. Kp 4: unsettled. Kp 5: minor storm, aurora visible ~55deg latitude.
      Kp 6: moderate storm, aurora ~45deg. Kp 7-8: strong, GPS/HF degradation, power grid stress.
      Kp 9: extreme historic-level event.

      :param days: Number of days to look back (default 7)
      """
      start, end = _date_range(days)
      resp = requests.get(f"{BASE_URL}/GST", params={"startDate": start, "endDate": end})
      resp.raise_for_status()
      return json.dumps(resp.json(), indent=2)


  def get_solar_flares(min_class: str = "M", days: int = 7) -> str:
      """Get recent solar flares from NASA DONKI.
      Flare classes in ascending intensity: A, B, C, M, X. Each letter is 10x the previous.
      M and X class flares have Earth-facing consequences.
      The number after the letter is a multiplier (e.g. M2.7 = 2.7x the M threshold).

      :param min_class: Minimum flare class to return — A, B, C, M, or X (default M)
      :param days: Number of days to look back (default 7)
      """
      start, end = _date_range(days)
      resp = requests.get(f"{BASE_URL}/FLR", params={"startDate": start, "endDate": end, "class": min_class})
      resp.raise_for_status()
      return json.dumps(resp.json(), indent=2)


  def get_cme_events(days: int = 7) -> str:
      """Get recent coronal mass ejection (CME) events from NASA DONKI.
      Includes start time, speed, direction, half-angle, and linked source flares.
      CME SCORE speed scale: S (<500 km/s), C (500-999), O (1000-1999), R (2000-2999), ER (>3000).

      :param days: Number of days to look back (default 7)
      """
      start, end = _date_range(days)
      resp = requests.get(f"{BASE_URL}/CME", params={"startDate": start, "endDate": end})
      resp.raise_for_status()
      return json.dumps(resp.json(), indent=2)


  def get_radiation_belt_enhancements(days: int = 7) -> str:
      """Get recent radiation belt enhancement (RBE) events from NASA DONKI.
      Relevant for satellite operations and high-altitude radiation exposure.

      :param days: Number of days to look back (default 7)
      """
      start, end = _date_range(days)
      resp = requests.get(f"{BASE_URL}/RBE", params={"startDate": start, "endDate": end})
      resp.raise_for_status()
      return json.dumps(resp.json(), indent=2)
