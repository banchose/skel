prompt: invent a dog
schema_object:
    type: object
    properties:
        name:
            type: string
            description: The dog's name
        breed:
            type: string
            description: The dog's breed
        age:
            type: integer
            description: The dog's age in years
        personality:
            type: array
            items:
                type: string
            description: List of personality traits
        color:
            type: string
            description: The dog's primary color
        weight_pounds:
            type: number
            description: The dog's weight in pounds
        favorite_activities:
            type: array
            items:
                type: string
            description: Things the dog loves to do
    required:
    - name
    - breed
    - age
    - personality
    - color
