# kubectl get service -A
# Look for ingress controller service and the IP
# kubectl exec -it bash-shell-8f59fbd65-5n7gt -- bash
# kubectl exec -it bash-shell-8f59fbd65-5n7gt -- wget -q -O- 10.96.11.30 (ingress srv ip)
# kubectl exec -it bash-shell-8f59fbd65-5n7gt -- wget -q -O- 10.96.11.30/echo-server (ingress srv ip)

apiVersion: apps/v1
kind: Deployment
metadata:
  name: bash-shell
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bash-shell
  template:
    metadata:
      labels:
        app: bash-shell
    spec:
      containers:
        - name: bash
          image: bash:latest
          command: ["/usr/local/bin/bash"] # Correct path in the image
          args: ["-c", "while true; do sleep 3600; done"]
