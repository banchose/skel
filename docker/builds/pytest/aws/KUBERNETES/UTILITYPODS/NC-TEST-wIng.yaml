apiVersion: apps/v1
kind: Deployment
metadata:
  name: nc-test
  namespace: default
  labels:
    app: nc-test
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nc-test
  template:
    metadata:
      labels:
        app: nc-test
    spec:
      containers:
      - name: nc-test
        image: busybox
        command: ["/bin/sh"]
        args:
          - -c
          - >
            while true; do 
              { echo -e 'HTTP/1.1 200 OK\r\nContent-Type: text/plain\r\nContent-Length: 26\r\n\r\nHello from Kubernetes Pod!'; } | nc -l -p 80;
              echo "$(date) - Request received" >> /tmp/requests.log;
            done
        ports:
        - containerPort: 80
          name: web

---
apiVersion: v1
kind: Service
metadata:
  name: nc-test
  namespace: default
spec:
  selector:
    app: nc-test
  ports:
  - port: 8080
    targetPort: web

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
  name: nc-test
  namespace: default
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /nc-test
            pathType: Prefix
            backend:
              service:
                name: nc-test
                port:
                  number: 8080
  # Optional: If you want to add TLS configuration
  # tls:
  # - hosts:
  #   - your-hostname.example.com
