#     PermissionSetArn: !GetAtt rEKSDeveloperPermissionSet.PermissionSetArn
#     PrincipalId: !Ref DeveloperGroupId
#     PrincipalType: GROUP
#     TargetId: !Ref pQaTestAccount
#     TargetType: AWS_ACCOUNT
      
# rAccountAssignment2:
#   Type: AWS::SSO::Assignment
#   Condition: HasTwoOrMoreAccounts
#   Properties:
#     InstanceArn: !Sub 'arn:aws:sso:::instance/${pSSOInstanceId}'
#     PermissionSetArn: !GetAtt rEKSDeveloperPermissionSet.PermissionSetArn
#     PrincipalId: !Ref DeveloperGroupId
#     PrincipalType: GROUP
#     TargetId: !Select [1, !Ref TargetAccountIds]
#     TargetType: AWS_ACCOUNT

Outputs:
  oPermissionSetArn:
    Description: ARN of the created permission set
    Value: !GetAtt rEKSDeveloperPermissionSet.PermissionSetArn

