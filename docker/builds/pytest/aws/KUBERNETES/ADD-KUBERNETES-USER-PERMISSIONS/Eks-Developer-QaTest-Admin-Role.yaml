# aws cloudformation create-stack \
# --stack-name Eks-Developer-QaTest-Admin-Role \
# --template-body file://Eks-Developer-QaTest-Admin-Role.yaml \
# --region us-east-1 \
# --profile man
AWSTemplateFormatVersion: '2010-09-09'

Parameters:

  pSSOInstanceId:
    Type: String
    Default: ssoins-722356dbd9c212b8

  pQaTestAccount:
    Type: String
    Default: 405350004483
    Description: Account for both Test and Qa Eks deployments

  pDeveloperGroupId:
    Type: String
    Default: "340864f8-a051-70a9-eb21-1d10ae03c5f4"
    Description: IAM IC Group eks-devs
    # InstanceArn: arn:aws:sso:::instance/ssoins-722356dbd9c212b8

Resources:
  rEKSDeveloperPermissionSet:
    Type: AWS::SSO::PermissionSet
    Properties:
      Name: rEKSDeveloperPermissionSet
      Description: Permission set for EKS developers with broad cluster management capabilities
      InstanceArn: !Sub 'arn:aws:sso:::instance/${pSSOInstanceId}'
      SessionDuration: PT8H  # 8 hours
      ManagedPolicies:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
      InlinePolicy: |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Effect": "Allow",
              "Action": [
                "eks:*",
                "ec2:DescribeInstances",
                "ec2:DescribeRouteTables",
                "ec2:DescribeSecurityGroups",
                "ec2:DescribeSubnets",
                "ec2:DescribeVpcs",
                "iam:GetRole",
                "iam:ListAttachedRolePolicies",
                "cloudformation:DescribeStacks",
                "cloudformation:ListStackResources"
              ],
              "Resource": "*"
            },
            {
              "Effect": "Deny",
              "Action": [
                "eks:DeleteCluster",
                "eks:DeleteFargateProfile",
                "eks:DeleteNodegroup"
              ],
              "Resource": [
                "arn:aws:eks:*:*:cluster/production-*"
              ]
            }
          ]
        }
      Tags:
        - Key: env
          Value: dev
        - Key: Name
          Value: QaTestPermissionSet

  rEKSDeveloperAssignmentQaTest:
    Type: AWS::SSO::Assignment
    Properties:
      InstanceArn: !Sub 'arn:aws:sso:::instance/${pSSOInstanceId}'
      PermissionSetArn: !GetAtt rEKSDeveloperPermissionSet.PermissionSetArn
      PrincipalId: !Ref pDeveloperGroupId  # This is the ID of your developer group in IAM Identity Center
      PrincipalType: GROUP
      TargetId: !Ref pQaTestAccount  # The AWS account ID where permissions should apply
      TargetType: AWS_ACCOUNT

# rAccountAssignmentQA:
#   Type: AWS::SSO::Assignment
#   Properties:
