services:
  openwebui:
    ports: !reset []
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openwebui.rule=Host(`openwebui.xaax.dev`)"
      - "traefik.http.routers.openwebui.entrypoints=websecure"
      - "traefik.http.routers.openwebui.tls=true"
      - "traefik.http.services.openwebui.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik_web"
    networks:
      - traefik_web

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    networks:
      - traefik_web
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK}
#     - LITELLM_MASTER_KEY=sk-V10
  
#####
  mcpo-timeserver:
    build:
      context: .
      dockerfile: ./Dockerfile.mcpo.timeserver
    networks:
      - traefik_web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcpo-awsdoc:
    build:
      context: .
      dockerfile: ./Dockerfile.mcpo.awsdoc
    networks:
      - traefik_web
    restart: unless-stopped
    environment:
      - FASTMCP_LOG_LEVEL=ERROR
      - AWS_DOCUMENTATION_PARTITION=aws
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


  mcpo-aws-knowledge:
    build:
      context: .
      dockerfile: ./Dockerfile.mcpo.aws-know
    networks:
      - traefik_web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
#####

networks:
  traefik_web:
    external: true
