user una;
daemon off;
error_log /tmp/nginx-error.log;
worker_processes 1;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  server {
    access_log /tmp/nginx-access.log;
    client_body_temp_path /tmp/client_body;
    listen 8080;
    location / {
      root /data/www;
    }
    location /images/ {
      root /data;
    }
  }
}
